name: 📸 اسکرین‌شات تمام صفحه مانهاوا

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'لینک صفحه چپتر'
        required: true
      filename:
        description: 'اسم فایل خروجی (مثلاً chapter-130)'
        required: true
        default: 'chapter'

permissions:
  contents: write

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - name: ⚙️ آماده‌سازی مخزن
        uses: actions/checkout@v4

      - name: 📦 نصب Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🎭 نصب Playwright و مرورگر
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium

      - name: 🖼️ بارگذاری صفحه و اسکرین‌شات کامل
        run: |
          node -e "
          const { chromium } = require('playwright');
          const fs = require('fs');

          (async () => {
            const browser = await chromium.launch({ headless: true });
            const context = await browser.newContext({
              viewport: { width: 800, height: 600 },
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36'
            });
            const page = await context.newPage();

            const url = '${{ github.event.inputs.url }}';
            console.log('⏳ بارگذاری:', url);

            // رفتن به صفحه
            await page.goto(url, { waitUntil: 'domcontentloaded', timeout: 60000 }).catch(e => {
              console.log('⚠️ بارگذاری اولیه طول کشید، ادامه میدیم...');
            });

            // صبر برای لود اولیه جاوااسکریپت
            await page.waitForTimeout(5000);

            // اسکرول هوشمندانه برای فعال‌سازی همه عکس‌های تنبل
            console.log('📜 اسکرول به پایین...');
            await page.evaluate(async () => {
              await new Promise((resolve) => {
                let totalHeight = 0;
                const distance = 400;
                const timer = setInterval(() => {
                  window.scrollBy(0, distance);
                  totalHeight += distance;
                  if (totalHeight >= document.body.scrollHeight) {
                    clearInterval(timer);
                    resolve();
                  }
                }, 150);
              });
            });

            // صبر نهایی بعد از اسکرول
            await page.waitForTimeout(3000);

            // گرفتن اسکرین‌شات تمام صفحه (fullPage)
            const filename = '${{ github.event.inputs.filename }}.png';
            console.log('📸 گرفتن اسکرین‌شات...');
            await page.screenshot({ path: filename, fullPage: true });
            console.log('✅ اسکرین‌شات ذخیره شد:', filename);

            await browser.close();
          })();
          "

      - name: 💾 ذخیره در ریپازیتوری
        run: |
          git config user.name "actions"
          git config user.email "actions@github.com"
          git add "*.png"
          git commit -m "📸 افزودن اسکرین‌شات ${{ github.event.inputs.filename }}" || echo "بدون تغییر"
          git push
