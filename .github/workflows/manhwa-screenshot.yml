name: 📸 اسکرین‌شات ضد کلودفلر

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'لینک صفحه چپتر'
        required: true
      filename:
        description: 'اسم فایل خروجی (مثلاً chapter-130)'
        required: true
        default: 'chapter'

permissions:
  contents: write

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - name: ⚙️ آماده‌سازی مخزن
        uses: actions/checkout@v4

      - name: 📦 نصب Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🎭 نصب Playwright و مرورگر Chrome واقعی
        run: |
          npm init -y
          npm install playwright
          npx playwright install chrome

      - name: 🖼️ اسکرین‌شات با Google Chrome واقعی
        run: |
          node -e "
          const { chromium } = require('playwright');
          const fs = require('fs');

          (async () => {
            const browser = await chromium.launch({
              channel: 'chrome',
              headless: true,
              args: [
                '--no-sandbox',
                '--disable-setuid-sandbox',
                '--disable-dev-shm-usage',
                '--disable-gpu'
              ]
            });

            const context = await browser.newContext({
              viewport: { width: 412, height: 915 },
              userAgent: 'Mozilla/5.0 (Linux; Android 13; Pixel 7) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/119.0.0.0 Mobile Safari/537.36',
              locale: 'en-US',
              timezoneId: 'America/New_York',
              permissions: ['geolocation']
            });

            const page = await context.newPage();

            // رد کردن خودکار درخواست‌های غیرضروری برای سرعت
            await page.route('**/*.{png,jpg,jpeg,gif,svg,css,font,woff,woff2}', route => {});

            const url = '${{ github.event.inputs.url }}';
            console.log('⏳ بارگذاری:', url);

            try {
              await page.goto(url, { waitUntil: 'domcontentloaded', timeout: 90000 });
              console.log('✅ صفحه اولیه باز شد.');
            } catch (e) {
              console.log('⚠️ خطا در لود اولیه اما ادامه میدیم:', e.message);
            }

            // صبر طولانی برای محو شدن چالش Cloudflare
            console.log('⏰ صبر برای بررسی Cloudflare...');
            await page.waitForTimeout(12000);

            // بررسی دستی وجود Cloudflare
            const hasCloudflare = await page.evaluate(() => {
              return document.body.innerText.includes('Just a moment') ||
                     document.title.includes('Cloudflare');
            });
            if (hasCloudflare) {
              console.log('⚠️ هنوز صفحه Cloudflare هست، صبر بیشتر...');
              await page.waitForTimeout(15000);
            }

            // اسکرول هوشمندانه
            console.log('📜 اسکرول برای لود عکس‌ها...');
            await page.evaluate(async () => {
              await new Promise((resolve) => {
                let totalHeight = 0;
                const distance = 500;
                const timer = setInterval(() => {
                  window.scrollBy(0, distance);
                  totalHeight += distance;
                  if (totalHeight >= document.body.scrollHeight) {
                    clearInterval(timer);
                    resolve();
                  }
                }, 250);
              });
            });

            await page.waitForTimeout(4000);

            const filename = '${{ github.event.inputs.filename }}.png';
            console.log('📸 اسکرین‌شات...');
            await page.screenshot({ path: filename, fullPage: true });
            console.log('✅ ذخیره شد:', filename);

            await browser.close();
          })();
          "

      - name: 💾 آپلود در ریپازیتوری
        run: |
          git config user.name "actions"
          git config user.email "actions@github.com"
          git add *.png
          git commit -m "📸 اسکرین‌شات ${{ github.event.inputs.filename }}" || echo "تغییری نبود"
          git push
