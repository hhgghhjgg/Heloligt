name: Test Space Simple

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Install and Test
        run: |
          pip install -q gradio_client
          
          python3 << 'PYEOF'
          from gradio_client import Client
          
          print("🔌 اتصال به Space تستی...")
          try:
              client = Client("gradio/hello_world")
              result = client.predict(name="دیپ سیک و هادی", api_name="/predict")
              print(f"✅ جواب گرفتیم: {result}")
          except Exception as e:
              print(f"❌ خطا: {e}")
          PYEOF
