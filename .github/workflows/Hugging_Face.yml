name: Check HF Token Scopes

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Check Token and Save Result
        run: |
          echo "========================================="
          echo "🔍 شروع بررسی توکن Hugging Face"
          echo "========================================="
          
          HF_TOKEN="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"
          RESULT_FILE="token-check-result.md"
          
          echo "# نتیجه بررسی توکن Hugging Face" > $RESULT_FILE
          echo "" >> $RESULT_FILE
          echo "**تاریخ:** $(date '+%Y-%m-%d %H:%M:%S')" >> $RESULT_FILE
          echo "" >> $RESULT_FILE
          echo "---" >> $RESULT_FILE
          echo "" >> $RESULT_FILE

          # 1. اطلاعات کاربر
          echo "## 1. اطلاعات صاحب توکن" >> $RESULT_FILE
          echo "" >> $RESULT_FILE
          USER_INFO=$(curl -s -H "Authorization: Bearer $HF_TOKEN" https://huggingface.co/api/whoami)
          echo "DEBUG: User Info = $USER_INFO"
          USERNAME=$(echo "$USER_INFO" | python3 -c "import sys,json; print(json.load(sys.stdin).get('name','نامشخص'))" 2>/dev/null || echo "خطا")
          EMAIL=$(echo "$USER_INFO" | python3 -c "import sys,json; print(json.load(sys.stdin).get('email','ندارد'))" 2>/dev/null || echo "خطا")
          
          echo "- **نام کاربری:** $USERNAME" >> $RESULT_FILE
          echo "- **ایمیل:** $EMAIL" >> $RESULT_FILE
          echo "" >> $RESULT_FILE

          # 2. خواندن
          echo "## 2. خواندن (Read)" >> $RESULT_FILE
          echo "" >> $RESULT_FILE
          READ_CODE=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: Bearer $HF_TOKEN" https://huggingface.co/api/models/gpt2)
          if [ "$READ_CODE" = "200" ]; then
            echo "- ✅ فعال" >> $RESULT_FILE
          else
            echo "- ❌ غیرفعال (کد $READ_CODE)" >> $RESULT_FILE
          fi
          echo "" >> $RESULT_FILE

          # 3. نوشتن
          echo "## 3. نوشتن (Write)" >> $RESULT_FILE
          echo "" >> $RESULT_FILE
          TIMESTAMP=$(date +%s)
          WRITE_CODE=$(curl -s -X POST -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $HF_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{}' \
            "https://huggingface.co/api/repos/create?name=test-${TIMESTAMP}&type=model&private=true")
          if [ "$WRITE_CODE" = "200" ]; then
            echo "- ✅ فعال" >> $RESULT_FILE
          else
            echo "- ❌ غیرفعال (کد $WRITE_CODE)" >> $RESULT_FILE
          fi
          echo "" >> $RESULT_FILE

          # 4. Inference API
          echo "## 4. Inference API" >> $RESULT_FILE
          echo "" >> $RESULT_FILE
          INFERENCE_CODE=$(curl -s -X POST -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $HF_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"inputs":"test"}' \
            "https://api-inference.huggingface.co/models/gpt2")
          if [ "$INFERENCE_CODE" = "200" ] || [ "$INFERENCE_CODE" = "503" ]; then
            echo "- ✅ فعال" >> $RESULT_FILE
          else
            echo "- ❌ غیرفعال (کد $INFERENCE_CODE)" >> $RESULT_FILE
          fi
          echo "" >> $RESULT_FILE

          # 5. Spaces
          echo "## 5. Spaces" >> $RESULT_FILE
          echo "" >> $RESULT_FILE
          SPACES_CODE=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: Bearer $HF_TOKEN" https://huggingface.co/api/spaces)
          if [ "$SPACES_CODE" = "200" ]; then
            echo "- ✅ فعال" >> $RESULT_FILE
          else
            echo "- ❌ غیرفعال (کد $SPACES_CODE)" >> $RESULT_FILE
          fi
          echo "" >> $RESULT_FILE

          # 6. خلاصه
          echo "## 6. خلاصه نهایی" >> $RESULT_FILE
          echo "" >> $RESULT_FILE
          echo "| قابلیت | وضعیت |" >> $RESULT_FILE
          echo "|--------|-------|" >> $RESULT_FILE
          if [ "$READ_CODE" = "200" ]; then echo "| خواندن | ✅ |" >> $RESULT_FILE; else echo "| خواندن | ❌ |" >> $RESULT_FILE; fi
          if [ "$WRITE_CODE" = "200" ]; then echo "| نوشتن | ✅ |" >> $RESULT_FILE; else echo "| نوشتن | ❌ |" >> $RESULT_FILE; fi
          if [ "$INFERENCE_CODE" = "200" ] || [ "$INFERENCE_CODE" = "503" ]; then echo "| Inference API | ✅ |" >> $RESULT_FILE; else echo "| Inference API | ❌ |" >> $RESULT_FILE; fi
          if [ "$SPACES_CODE" = "200" ]; then echo "| Spaces | ✅ |" >> $RESULT_FILE; else echo "| Spaces | ❌ |" >> $RESULT_FILE; fi
          
          echo "" >> $RESULT_FILE
          echo "---" >> $RESULT_FILE
          echo "" >> $RESULT_FILE
          echo "✅ بررسی کامل شد" >> $RESULT_FILE

      - name: Push Result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add token-check-result.md
          git commit -m "نتیجه بررسی توکن" || echo "بدون تغییر"
          git push
