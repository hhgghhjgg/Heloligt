name: Test Cloudflare Worker

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Test Worker
        run: |
          echo "🧪 Testing Cloudflare Worker..."
          
          # آدرس Worker خودت رو اینجا بذار
          WORKER_URL="https://morning-waterfall-79c0.workers.dev"
          
          echo "📡 Sending request to: $WORKER_URL"
          
          # تست ۱: درخواست ساده
          echo ""
          echo "=== Test 1: GET Request ==="
          RESPONSE=$(curl -s -w "\nHTTP_CODE:%{http_code}" "$WORKER_URL" 2>&1)
          HTTP_CODE=$(echo "$RESPONSE" | grep "HTTP_CODE:" | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | sed '/HTTP_CODE:/d')
          
          echo "HTTP Status: $HTTP_CODE"
          echo "Response body (first 500 chars):"
          echo "$BODY" | head -c 500
          
          # تست ۲: درخواست با User-Agent موبایل
          echo ""
          echo "=== Test 2: Mobile User-Agent ==="
          MOBILE_RESPONSE=$(curl -s -w "\nHTTP_CODE:%{http_code}" \
            -H "User-Agent: Mozilla/5.0 (Linux; Android 10) AppleWebKit/537.36" \
            "$WORKER_URL" 2>&1)
          MOBILE_CODE=$(echo "$MOBILE_RESPONSE" | grep "HTTP_CODE:" | cut -d: -f2)
          echo "HTTP Status: $MOBILE_CODE"
          
          # تست ۳: DNS Resolution
          echo ""
          echo "=== Test 3: DNS Resolution ==="
          WORKER_HOST=$(echo "$WORKER_URL" | sed 's|https://||')
          nslookup "$WORKER_HOST" 2>&1 || echo "DNS lookup failed"
          
          # ذخیره نتایج
          mkdir -p sites/worker-test
          echo "Test URL: $WORKER_URL" > sites/worker-test/result.txt
          echo "HTTP Status: $HTTP_CODE" >> sites/worker-test/result.txt
          echo "Mobile Status: $MOBILE_CODE" >> sites/worker-test/result.txt
          echo "" >> sites/worker-test/result.txt
          echo "=== Response Body ===" >> sites/worker-test/result.txt
          echo "$BODY" | head -c 2000 >> sites/worker-test/result.txt
          
          # نتیجه‌گیری
          echo ""
          echo "=== Summary ==="
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Worker is ACTIVE and responding!"
          elif [ "$HTTP_CODE" = "530" ] || [ "$HTTP_CODE" = "000" ]; then
            echo "⚠️ Worker is OFFLINE or not deployed"
          else
            echo "❓ Worker returned HTTP $HTTP_CODE"
          fi

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sites/worker-test/
          git commit -m "🧪 Cloudflare Worker test | $(date '+%Y-%m-%d %H:%M')" || echo "Nothing to commit"
          git pull --rebase && git push || true
