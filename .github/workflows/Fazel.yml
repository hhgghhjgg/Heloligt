name: Debug Telemetr HTML Structure

on:
  workflow_dispatch:
    inputs:
      channel:
        description: 'نام کاربری کانال (بدون @)'
        required: true
        default: 'badsoccer'

permissions:
  contents: write

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      flaresolverr:
        image: ghcr.io/flaresolverr/flaresolverr:latest
        ports:
          - 8191:8191

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install -q requests beautifulsoup4

      - name: Wait for FlareSolverr
        run: |
          for i in $(seq 1 30); do
            status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8191/v1 2>/dev/null || echo "000")
            if [ "$status" = "200" ] || [ "$status" = "405" ]; then break; fi
            sleep 2
          done

      - name: Fetch and save raw HTML
        env:
          CHANNEL: ${{ github.event.inputs.channel }}
        run: |
          python3 << 'PYEOF'
          import os, requests
          from datetime import datetime

          channel = os.environ["CHANNEL"]
          telemetr_url = f"https://telemetr.io/en/channels/@{channel}"

          print(f"📡 Fetching {telemetr_url}")

          fs_url = "http://localhost:8191/v1"
          payload = {"cmd": "request.get", "url": telemetr_url, "maxTimeout": 120000}
          resp = requests.post(fs_url, json=payload, timeout=150)
          data = resp.json()

          html_content = data.get("solution", {}).get("response", "")
          status = data.get("status", "unknown")
          message = data.get("message", "")

          print(f"Status: {status}")
          print(f"Message: {message}")
          print(f"HTML length: {len(html_content)} chars")

          # Save raw HTML
          timestamp = datetime.now().strftime("%Y-%m-%d_%H-%M")
          output_dir = f"sites/telegram/{channel}/{timestamp}"
          os.makedirs(output_dir, exist_ok=True)

          with open(f"{output_dir}/raw.html", "w", encoding="utf-8") as f:
              f.write(html_content)

          # Also save first 5000 chars for quick preview
          with open(f"{output_dir}/preview.txt", "w", encoding="utf-8") as f:
              f.write(html_content[:5000])

          print(f"✅ Saved to {output_dir}")
          print(f"📄 Preview saved")
          PYEOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sites/telegram/
          git commit -m "🔍 Debug HTML for @${{ github.event.inputs.channel }}" || echo "Nothing to commit"
          git pull --rebase && git push || true
