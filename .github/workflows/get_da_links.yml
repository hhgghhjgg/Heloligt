name: Download 3D Models from DeviantArt

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'لینک گالری یا پست DeviantArt'
        required: true
        default: 'https://www.deviantart.com/alilexx/gallery'
      max_files:
        description: 'حداکثر تعداد فایل برای دانلود'
        required: false
        default: '5'

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      flaresolverr:
        image: ghcr.io/flaresolverr/flaresolverr:latest
        ports:
          - 8191:8191

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pip install -q gallery-dl beautifulsoup4

      - name: Wait for FlareSolverr
        run: |
          for i in $(seq 1 30); do
            status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8191/v1 2>/dev/null || echo "000")
            if [ "$status" = "200" ] || [ "$status" = "405" ]; then
              echo "FlareSolverr ready"
              break
            fi
            sleep 2
          done

      - name: Get Download Page URLs
        env:
          TARGET_URL: ${{ inputs.url }}
        run: |
          mkdir -p downloads
          # اینبار به جای `--get-urls` از `--write-pages` استفاده می‌کنیم
          # تا لینک صفحات دانلود رو بگیریم
          gallery-dl --write-pages --sleep 2 --sleep-request 1 \
            --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            "$TARGET_URL" > gallery_output.txt 2> error.log || true
          # فقط URLهای صفحه دانلود رو استخراج کن
          grep -oP 'https?://www\.deviantart\.com/[^/]+/art/[^/\s]+' gallery_output.txt | sort -u > download_pages.txt
          echo "Found $(wc -l < download_pages.txt) download pages"

      - name: Process Download Pages
        env:
          MAX_FILES: ${{ inputs.max_files }}
        run: |
          if [ ! -s download_pages.txt ]; then
            echo "No download pages found. Trying direct URL method..."
            # روش جایگزین: gallery-dl --get-urls
            gallery-dl --get-urls --sleep 2 --sleep-request 1 \
              --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
              "$TARGET_URL" | grep -E '^https?://' > urls.txt || true
            echo "Found $(wc -l < urls.txt) direct URLs"
          else
            echo "Processing download pages..."
            count=0
            > urls.txt
            while IFS= read -r page_url; do
              [ -z "$page_url" ] && continue
              count=$((count + 1))
              [ $count -gt $MAX_FILES ] && break
              echo "Processing ($count): $page_url"

              # باز کردن صفحه با FlareSolverr
              payload="{\"cmd\":\"request.get\",\"url\":\"$page_url\",\"maxTimeout\":180000}"
              response=$(curl -s -X POST http://localhost:8191/v1 -H "Content-Type: application/json" -d "$payload")
              body=$(echo "$response" | jq -r '.solution.response')

              # استخراج لینک دانلود مستقیم فایل سه‌بعدی
              download_link=$(echo "$body" | grep -oP 'https?://[^"\047]+\.(?:blend|fbx|obj|zip|rar|glb|gltf|stl|dae|3ds|max|unitypackage)[^"\047]*' | head -1)
              if [ -n "$download_link" ]; then
                echo "$download_link" >> urls.txt
                echo "  -> Found: $download_link"
              else
                echo "  -> No 3D file found"
              fi
              sleep 3
            done < download_pages.txt
          fi

      - name: Download 3D Files via FlareSolverr
        env:
          MAX_FILES: ${{ inputs.max_files }}
        run: |
          if [ ! -s urls.txt ]; then
            echo "No URLs to download."
            exit 0
          fi
          count=0
          while IFS= read -r file_url; do
            [ -z "$file_url" ] && continue
            count=$((count + 1))
            [ $count -gt $MAX_FILES ] && break
            filename=$(basename "$file_url" | sed 's/[?&].*//')
            if [ ${#filename} -gt 100 ]; then
              ext="${filename##*.}"
              filename="3d_model_${count}.${ext}"
            fi
            echo "Downloading: $filename"
            payload="{\"cmd\":\"request.get\",\"url\":\"$file_url\",\"maxTimeout\":180000}"
            response=$(curl -s -X POST http://localhost:8191/v1 -H "Content-Type: application/json" -d "$payload")
            http_status=$(echo "$response" | jq -r '.solution.status')
            body=$(echo "$response" | jq -r '.solution.response')
            if [ "$http_status" = "200" ] && [ -n "$body" ] && [ "$body" != "null" ]; then
              echo "$body" > "downloads/$filename"
              echo "  ✅ $filename ($(du -h "downloads/$filename" | cut -f1))"
            else
              echo "  ❌ Failed"
            fi
            sleep 2
          done < urls.txt

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/ all_urls.txt urls.txt error.log download_pages.txt 2>/dev/null || true
          git commit -m "3D models from DA | $(date '+%H:%M:%S')" || echo "Nothing to commit"
          git pull --rebase && git push || true
