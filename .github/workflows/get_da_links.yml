name: Get DA Links and Download via FlareSolverr

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'لینک گالری یا پست DeviantArt'
        required: true
        default: 'https://www.deviantart.com/alilexx/gallery'
      max_files:
        description: 'حداکثر تعداد فایل برای دانلود'
        required: false
        default: '10'

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      flaresolverr:
        image: ghcr.io/flaresolverr/flaresolverr:latest
        ports:
          - 8191:8191

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install -q gallery-dl

      - name: Wait for FlareSolverr
        run: |
          for i in $(seq 1 30); do
            status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8191/v1 2>/dev/null || echo "000")
            if [ "$status" = "200" ] || [ "$status" = "405" ]; then
              echo "FlareSolverr ready"
              break
            fi
            sleep 2
          done

      - name: Get direct image URLs
        env:
          TARGET_URL: ${{ inputs.url }}
        run: |
          mkdir -p downloads
          gallery-dl --get-urls --sleep 2 --sleep-request 1 --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/142.0.0.0 Safari/537.36" "$TARGET_URL" > all_urls.txt 2> error.log || true
          grep -E '^https?://' all_urls.txt > urls.txt || true
          echo "Found $(wc -l < urls.txt) direct URLs"

      - name: Download files via FlareSolverr
        env:
          MAX_FILES: ${{ inputs.max_files }}
        run: |
          if [ ! -s urls.txt ]; then
            echo "No URLs to download."
            exit 0
          fi
          count=0
          while IFS= read -r file_url; do
            [ -z "$file_url" ] && continue
            count=$((count + 1))
            [ $count -gt $MAX_FILES ] && break
            filename=$(basename "$file_url" | sed 's/[?&].*//')
            if [ ${#filename} -gt 100 ]; then
              ext="${filename##*.}"
              filename="file_${count}.${ext}"
            fi
            case "$filename" in
              *.*) ;;
              *) filename="${filename}.jpg" ;;
            esac
            payload="{\"cmd\":\"request.get\",\"url\":\"$file_url\",\"maxTimeout\":180000}"
            response=$(curl -s -X POST http://localhost:8191/v1 -H "Content-Type: application/json" -d "$payload")
            http_status=$(echo "$response" | jq -r '.solution.status')
            body=$(echo "$response" | jq -r '.solution.response')
            if [ "$http_status" = "200" ] && [ -n "$body" ] && [ "$body" != "null" ]; then
              echo "$body" > "downloads/$filename"
              echo "OK: $filename"
            else
              echo "FAIL: $file_url"
            fi
            sleep 2
          done < urls.txt

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/ all_urls.txt urls.txt error.log 2>/dev/null || true
          git commit -m "DA links and downloads | $(date '+%H:%M:%S')" || echo "Nothing to commit"
          git pull --rebase && git push || true
