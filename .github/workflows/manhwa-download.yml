name: 📸 دانلود چپتر مانهاوا با مرورگر واقعی

on:
  workflow_dispatch:
    inputs:
      url:
        description: '🔗 لینک صفحه چپتر (مثلاً https://manhuaus.com/...)'
        required: true
      folder:
        description: '📁 اسم پوشه ذخیره (مثلاً ch-45)'
        required: true

permissions:
  contents: write

jobs:
  download-chapter:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 ۱. دریافت کدهای ریپازیتوری
        uses: actions/checkout@v4

      - name: ⚙️ ۲. نصب Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🎭 ۳. نصب Playwright و مرورگر Chromium
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium

      - name: 🖼️ ۴. باز کردن صفحه، استخراج و دانلود تصاویر
        run: |
          node -e "
          const { chromium } = require('playwright');
          const fs = require('fs');
          const path = require('path');
          const https = require('https');
          const http = require('http');

          (async () => {
            const browser = await chromium.launch({ headless: true });
            const context = await browser.newContext({
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36'
            });
            const page = await context.newPage();

            console.log('⏳ در حال بارگذاری صفحه...');
            await page.goto('${{ github.event.inputs.url }}', { waitUntil: 'networkidle', timeout: 60000 }).catch(e => console.log('⚠️ صبر برای networkidle طول کشید، ادامه میدیم...'));
            
            // صبر اضافی برای لود تنبل تصاویر
            await page.waitForTimeout(5000);
            
            // اسکرول به پایین صفحه برای فعال شدن lazy loading
            await page.evaluate(async () => {
              await new Promise((resolve) => {
                let totalHeight = 0;
                const distance = 300;
                const timer = setInterval(() => {
                  window.scrollBy(0, distance);
                  totalHeight += distance;
                  if(totalHeight >= document.body.scrollHeight){
                    clearInterval(timer);
                    resolve();
                  }
                }, 100);
              });
            });

            await page.waitForTimeout(2000);

            // استخراج تمام تگ‌های img و background-image
            const images = await page.evaluate(() => {
              const imgs = [];
              // تگ‌های img
              document.querySelectorAll('img').forEach(img => {
                if(img.src && (img.src.startsWith('http') || img.src.startsWith('//'))) {
                  imgs.push(img.src);
                }
              });
              // background-image در استایل‌ها (اختیاری)
              document.querySelectorAll('[style*=\"background-image\"]').forEach(el => {
                const match = el.style.backgroundImage.match(/url\([\"']?([^\"')]+)[\"']?\)/);
                if(match && match[1]) imgs.push(match[1]);
              });
              return [...new Set(imgs)]; // حذف تکراری‌ها
            });

            console.log('🔍 تعداد تصاویر پیدا شده:', images.length);
            
            const folder = '${{ github.event.inputs.folder }}';
            if (!fs.existsSync(folder)) fs.mkdirSync(folder);

            // دانلود تصاویر
            for (let i = 0; i < images.length; i++) {
              let imageUrl = images[i];
              if (imageUrl.startsWith('//')) imageUrl = 'https:' + imageUrl;
              
              const ext = imageUrl.split('.').pop().split('?')[0] || 'jpg';
              const filename = path.join(folder, \`image_\${String(i+1).padStart(3,'0')}.\${ext}\`);
              
              console.log(\`⬇️ دانلود تصویر \${i+1}/\${images.length}: \${imageUrl.substring(0,80)}...\`);
              
              await new Promise((resolve) => {
                const client = imageUrl.startsWith('https') ? https : http;
                client.get(imageUrl, { headers: { 'Referer': '${{ github.event.inputs.url }}' } }, (response) => {
                  if (response.statusCode === 302 || response.statusCode === 301) {
                    // دنبال کردن تغییر مسیر
                    client.get(response.headers.location, (res) => {
                      const file = fs.createWriteStream(filename);
                      res.pipe(file);
                      file.on('finish', () => file.close(resolve));
                    });
                  } else {
                    const file = fs.createWriteStream(filename);
                    response.pipe(file);
                    file.on('finish', () => file.close(resolve));
                  }
                }).on('error', (e) => {
                  console.error(\`❌ خطا در دانلود: \${e.message}\`);
                  resolve();
                });
              });
            }

            await browser.close();
            console.log('✅ دانلود تصاویر کامل شد.');
          })();
          "

      - name: 💾 ۵. دخیره‌سازی فایل‌ها در ریپازیتوری
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add "${{ github.event.inputs.folder }}/"
          git commit -m "📚 افزودن چپتر ${{ github.event.inputs.folder }}" || echo "هیچ تغییر جدیدی وجود نداشت"
          git push
