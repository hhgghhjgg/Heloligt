name: Search Query (search)

on:
  workflow_dispatch:
    inputs:
      query:
        description: 'عبارت جستجو'
        required: true

permissions:
  contents: write

jobs:
  search:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      flaresolverr:
        image: ghcr.io/flaresolverr/flaresolverr:latest
        ports:
          - 8191:8191

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install -q requests beautifulsoup4

      - name: Wait for FlareSolverr
        run: |
          for i in $(seq 1 30); do
            status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8191/v1 2>/dev/null || echo "000")
            if [ "$status" = "200" ] || [ "$status" = "405" ]; then
              echo "FlareSolverr ready"
              break
            fi
            sleep 2
          done

      - name: Search via FlareSolverr
        env:
          SEARCH_QUERY: ${{ github.event.inputs.query }}
        run: |
          python3 << 'PYEOF'
          import os, json, requests
          from bs4 import BeautifulSoup
          from datetime import datetime
          from urllib.parse import quote_plus

          query = os.environ["SEARCH_QUERY"]
          timestamp = datetime.now().strftime("%Y-%m-%d_%H-%M")
          output_dir = f"sites/search/{timestamp}"
          os.makedirs(output_dir, exist_ok=True)

          search_url = f"https://html.duckduckgo.com/html/?q={quote_plus(query)}"

          print(f"🔍 Searching: {query}")
          print(f"📡 URL: {search_url}")

          # ارسال به FlareSolverr
          fs_url = "http://localhost:8191/v1"
          payload = {
              "cmd": "request.get",
              "url": search_url,
              "maxTimeout": 120000
          }

          resp = requests.post(fs_url, json=payload, timeout=150)
          data = resp.json()

          html = data.get("solution", {}).get("response", "")
          status = data.get("status", "error")
          message = data.get("message", "")

          print(f"Status: {status}")
          print(f"Message: {message}")

          if not html:
              print("❌ No HTML received")
              html = "<h1>😔 نتیجه‌ای یافت نشد. لطفاً دوباره تلاش کنید.</h1>"
              results = []
          else:
              # استخراج نتایج
              soup = BeautifulSoup(html, 'html.parser')
              results = []

              for item in soup.find_all('div', class_='result'):
                  title_tag = item.find('a', class_='result__a')
                  snippet_tag = item.find('a', class_='result__snippet')
                  link_tag = item.find('a', class_='result__url')

                  title = title_tag.get_text(strip=True) if title_tag else ""
                  link = link_tag.get('href', '') if link_tag else ""
                  snippet = snippet_tag.get_text(strip=True) if snippet_tag else ""

                  if title and link:
                      results.append({
                          "title": title,
                          "url": link,
                          "description": snippet
                      })

              print(f"✅ Found {len(results)} results")

          # ساخت HTML خروجی
          results_html = ""
          for r in results:
              results_html += f"""
              <div class="result">
                  <a href="{r['url']}">{r['title']}</a>
                  <br><span class="url">{r['url']}</span>
                  <br><span class="desc">{r['description']}</span>
              </div>"""

          if not results:
              results_html = '<p>😔 نتیجه‌ای یافت نشد.</p>'

          final_html = f"""<!DOCTYPE html>
          <html lang="fa" dir="rtl">
          <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>نتایج جستجو: {query}</title>
          <style>
          body {{ font-family: 'Segoe UI', Tahoma, sans-serif; background: #1e1e2e; color: #cdd6f4; padding: 20px; }}
          h1 {{ color: #cba6f7; border-bottom: 1px solid #313244; padding-bottom: 10px; }}
          .stats {{ color: #a6adc8; font-size: 0.9em; margin-bottom: 20px; }}
          .result {{ margin-bottom: 15px; padding: 15px; background: #181825; border-radius: 8px; border: 1px solid #313244; }}
          .result a {{ color: #89b4fa; text-decoration: none; font-size: 1.1em; font-weight: bold; }}
          .result a:hover {{ text-decoration: underline; }}
          .result .url {{ color: #6c7086; font-size: 0.85em; }}
          .result .desc {{ color: #a6adc8; margin-top: 5px; }}
          </style>
          </head>
          <body>
          <h1>🔍 نتایج جستجو برای: {query}</h1>
          <p class="stats">تاریخ: {timestamp} | تعداد نتایج: {len(results)}</p>
          <hr>
          {results_html}
          </body>
          </html>"""

          # ذخیره
          with open(f"{output_dir}/index.html", "w", encoding="utf-8") as f:
              f.write(final_html)

          with open(f"{output_dir}/urls.json", "w", encoding="utf-8") as f:
              json.dump(results, f, ensure_ascii=False, indent=2)

          print(f"💾 Saved to {output_dir}")
          PYEOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sites/search/
          git commit -m "🔍 Search: ${{ github.event.inputs.query }} | $(date '+%Y-%m-%d %H:%M')" || echo "Nothing to commit"
          git pull --rebase && git push || true
