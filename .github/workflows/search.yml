name: Search Query (search)

on:
  workflow_dispatch:
    inputs:
      query:
        description: 'عبارت جستجو'
        required: true

permissions:
  contents: write

jobs:
  search:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install -q duckduckgo-search

      - name: Search and save results as HTML
        env:
          SEARCH_QUERY: ${{ github.event.inputs.query }}
        run: |
          python3 << 'PYEOF'
          import os, json
          from datetime import datetime
          from duckduckgo_search import DDGS

          query = os.environ["SEARCH_QUERY"]
          timestamp = datetime.now().strftime("%Y-%m-%d_%H-%M")
          output_dir = f"sites/search/{timestamp}"
          os.makedirs(output_dir, exist_ok=True)

          results = []
          try:
              with DDGS() as ddgs:
                  for r in ddgs.text(query, max_results=10):
                      results.append({
                          "title": r.get("title", ""),
                          "url": r.get("href", ""),
                          "description": r.get("body", "")
                      })
          except Exception as e:
              print(f"Search error: {e}")

          # Build HTML
          html = f"""<!DOCTYPE html>
          <html lang="fa" dir="rtl">
          <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>نتایج جستجو: {query}</title>
          <style>
          body {{ font-family: 'Segoe UI', Tahoma, sans-serif; background: #1e1e2e; color: #cdd6f4; padding: 20px; }}
          h1 {{ color: #cba6f7; border-bottom: 1px solid #313244; padding-bottom: 10px; }}
          .stats {{ color: #a6adc8; font-size: 0.9em; margin-bottom: 20px; }}
          .result {{ margin-bottom: 15px; padding: 15px; background: #181825; border-radius: 8px; border: 1px solid #313244; }}
          .result a {{ color: #89b4fa; text-decoration: none; font-size: 1.1em; font-weight: bold; }}
          .result a:hover {{ text-decoration: underline; }}
          .result .url {{ color: #6c7086; font-size: 0.85em; }}
          .result .desc {{ color: #a6adc8; margin-top: 5px; }}
          </style>
          </head>
          <body>
          <h1>🔍 نتایج جستجو برای: {query}</h1>
          <p class="stats">تاریخ: {timestamp} | تعداد نتایج: {len(results)}</p>
          <hr>
          {"".join(f'<div class="result"><a href="{r["url"]}">{r["title"]}</a><br><span class="url">{r["url"]}</span><br><span class="desc">{r["description"]}</span></div>' for r in results) if results else '<p>😔 نتیجه‌ای یافت نشد.</p>'}
          </body>
          </html>"""

          with open(f"{output_dir}/index.html", "w", encoding="utf-8") as f:
              f.write(html)

          with open(f"{output_dir}/urls.json", "w", encoding="utf-8") as f:
              json.dump(results, f, ensure_ascii=False, indent=2)

          print(f"Done. {len(results)} results saved to {output_dir}")
          PYEOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sites/search/
          git commit -m "🔍 Search: ${{ github.event.inputs.query }} | $(date '+%Y-%m-%d %H:%M')" || echo "Nothing to commit"
          git pull --rebase && git push || true
