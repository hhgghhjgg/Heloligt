name: Anime Image → 3D Model (Fixed Positional)

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'توضیحات کاراکتر انیمه‌ای (انگلیسی)'
        required: true
        default: '1girl, solo, long hair, blue eyes, detailed kimono, cherry blossoms, masterpiece, best quality'
      negative_prompt:
        description: 'چیزایی که نمی‌خوای'
        required: false
        default: 'lowres, bad anatomy, bad hands, text, error, missing fingers, extra digit, fewer digits, cropped, worst quality, low quality, normal quality, jpeg artifacts, signature, watermark, username, blurry'

permissions:
  contents: write

jobs:
  image-to-3d:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: pip install -q gradio_client pillow

      - name: 1. Generate Anime Image (Animagine XL 3.1)
        env:
          PROMPT: ${{ inputs.prompt }}
          NEGATIVE_PROMPT: ${{ inputs.negative_prompt }}
        run: |
          echo "🎨 مرحله ۱: ساخت تصویر انیمه‌ای..."
          python3 << 'PYEOF'
          import os, shutil
          from gradio_client import Client

          prompt = os.environ["PROMPT"]
          neg_prompt = os.environ["NEGATIVE_PROMPT"]

          client = Client("cagliostrolab/animagine-xl-3.1")
          
          # به ترتیب positional طبق info فضا:
          # prompt, negative_prompt, seed, width, height, guidance_scale,
          # num_inference_steps, sampler, aspect_ratio, style_preset, quality_tags_presets
          result = client.predict(
              prompt,               # 1
              neg_prompt,           # 2
              42,                   # 3 seed
              1024,                 # 4 width
              1024,                 # 5 height
              7,                    # 6 guidance_scale
              28,                   # 7 num_inference_steps
              "DPM++ 2M Karras",    # 8 sampler
              "1024 x 1024",        # 9 aspect_ratio
              "(None)",             # 10 style_preset
              "Standard v3.1",      # 11 quality_tags_presets
              api_name="/run"
          )
          
          # result مسیر فایل تصویر خروجی است
          shutil.copy(result, "anime_original.png")
          print("✅ تصویر انیمه ذخیره شد: anime_original.png")
          PYEOF

      - name: 2. Convert to 3D Model (Hunyuan3D-2)
        run: |
          echo "🧊 مرحله ۲: تبدیل به مدل سه‌بعدی..."
          python3 << 'PYEOF'
          import os, shutil
          from gradio_client import Client, handle_file

          client = Client("tencent/Hunyuan3D-2")
          
          # به ترتیب positional طبق info:
          # caption, image, steps, guidance_scale, seed, octree_resolution, check_box_rembg
          result = client.predict(
              "anime character",              # 1 caption
              handle_file("anime_original.png"), # 2 image
              25,                             # 3 steps
              6,                              # 4 guidance_scale
              42,                             # 5 seed
              "256",                          # 6 octree_resolution
              True,                           # 7 check_box_rembg
              api_name="/shape_generation"
          )

          print(f"خروجی مدل سه‌بعدی: {result}")
          # خروجی یک tuple (glb_path, obj_path, html_viewer) است
          if isinstance(result, tuple) and len(result) >= 1:
              glb_path = result[0]
              if glb_path and isinstance(glb_path, str) and glb_path.endswith('.glb'):
                  shutil.copy(glb_path, "anime_model.glb")
                  print("✅ مدل سه‌بعدی ذخیره شد: anime_model.glb")
              else:
                  print("⚠️ اولین خروجی یک فایل glb معتبر نبود.")
          else:
              print("⚠️ ساختار خروجی غیرمنتظره. کل خروجی چاپ شد.")
          PYEOF

      - name: 3. Commit and Push Results
        run: |
          echo "📤 ذخیره نتایج در ریپازیتوری..."
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add anime_original.png anime_model.glb 2>/dev/null || true
          git commit -m "🎨 تصویر انیمه + مدل سه‌بعدی | $(date '+%H:%M:%S')" || echo "چیزی برای کامیت نبود"
          git push || (git pull --rebase && git push)
          echo "✅ همه چیز تمام شد!"
