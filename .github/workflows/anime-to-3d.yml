name: Anime Image → 3D Model (Fixed API)

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'توضیحات کاراکتر انیمه‌ای (انگلیسی)'
        required: true
        default: '1girl, solo, long hair, blue eyes, detailed kimono, cherry blossoms, masterpiece, best quality'
      negative_prompt:
        description: 'چیزایی که نمی‌خوای'
        required: false
        default: 'lowres, bad anatomy, bad hands, text, error, missing fingers, extra digit, fewer digits, cropped, worst quality, low quality, normal quality, jpeg artifacts, signature, watermark, username, blurry'

permissions:
  contents: write

jobs:
  image-to-3d:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: pip install -q gradio_client pillow

      - name: 1. Generate Anime Image (Animagine XL 3.1)
        env:
          PROMPT: ${{ inputs.prompt }}
          NEGATIVE_PROMPT: ${{ inputs.negative_prompt }}
        run: |
          echo "🎨 مرحله ۱: ساخت تصویر انیمه‌ای..."
          python3 << 'PYEOF'
          import os, shutil
          from gradio_client import Client

          prompt = os.environ["PROMPT"]
          neg_prompt = os.environ["NEGATIVE_PROMPT"]

          client = Client("cagliostrolab/animagine-xl-3.1")
          
          # از api_name="/run" که توسط info فضا تأیید شده استفاده می‌کنیم
          result = client.predict(
              prompt=prompt,
              negative_prompt=neg_prompt,
              seed=42,
              width=1024,
              height=1024,
              guidance_scale=7,
              num_inference_steps=28,
              sampler="DPM++ 2M Karras",
              aspect_ratio="1024 x 1024",
              style_preset="(None)",
              quality_tags_presets="Standard v3.1",
              api_name="/run"
          )
          
          # نتیجه یک مسیر فایل موقت است
          shutil.copy(result, "anime_original.png")
          print(f"✅ تصویر اصلی ذخیره شد: anime_original.png")
          PYEOF

      - name: 2. Convert to 3D Model (Hunyuan3D-2)
        run: |
          echo "🧊 مرحله ۲: تبدیل به مدل سه‌بعدی..."
          python3 << 'PYEOF'
          import os, shutil
          from gradio_client import Client, handle_file

          # از api_name="/shape_generation" که توسط info فضا تأیید شده استفاده می‌کنیم
          client = Client("tencent/Hunyuan3D-2")
          result = client.predict(
              caption="anime character",
              image=handle_file("anime_original.png"),
              steps=25,
              guidance_scale=6,
              seed=42,
              octree_resolution="256",
              check_box_rembg=True,
              api_name="/shape_generation"
          )

          print(f"خروجی مدل سه‌بعدی: {result}")
          # خروجی یک تاپل (glb_path, obj_path, html_viewer) است
          if isinstance(result, tuple) and len(result) >= 2:
              glb_path = result[0]
              if glb_path and isinstance(glb_path, str) and glb_path.endswith('.glb'):
                  shutil.copy(glb_path, "anime_model.glb")
                  print("✅ مدل نهایی ذخیره شد: anime_model.glb")
              else:
                  print("⚠️ خروجی اول یک فایل glb معتبر نبود.")
          else:
              print("⚠️ ساختار خروجی غیرمنتظره بود. کل خروجی چاپ شد.")
          PYEOF

      - name: 3. Commit and Push Results
        run: |
          echo "📤 ذخیره نتایج در ریپازیتوری..."
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add anime_original.png anime_model.glb 2>/dev/null || true
          git commit -m "🎨 تولید تصویر انیمه و مدل سه‌بعدی | $(date '+%H:%M:%S')" || echo "چیزی برای کامیت نبود"
          git push || (git pull --rebase && git push)
          echo "✅ فرآیند تکمیل شد!"
