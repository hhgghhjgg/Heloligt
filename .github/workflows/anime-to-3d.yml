name: Anime to 3D Robust Final

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'توضیحات کاراکتر انیمه‌ای (انگلیسی)'
        required: true
        default: '1girl, solo, long hair, blue eyes, detailed kimono, cherry blossoms, masterpiece, best quality'
      negative_prompt:
        description: 'چیزهایی که نمی‌خواهید'
        required: false
        default: 'lowres, bad anatomy, bad hands, text, error, missing fingers, extra digit, fewer digits, cropped, worst quality, low quality, normal quality, jpeg artifacts, signature, watermark, username, blurry'

permissions:
  contents: write

jobs:
  anime-to-3d:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install -q gradio_client pillow

      - name: Generate anime image with Animagine XL
        env:
          PROMPT: ${{ inputs.prompt }}
          NEGATIVE_PROMPT: ${{ inputs.negative_prompt }}
        run: |
          python3 << 'PYEOF'
          import os, shutil
          from gradio_client import Client

          prompt = os.environ["PROMPT"]
          neg_prompt = os.environ["NEGATIVE_PROMPT"]

          print("🎨 Generating anime image...")
          client = Client("cagliostrolab/animagine-xl-3.1")

          result = client.predict(
              prompt,                  # 1
              neg_prompt,              # 2
              42,                      # 3 seed
              1024,                    # 4 width
              1024,                    # 5 height
              7,                       # 6 guidance_scale
              28,                      # 7 num_inference_steps
              "DPM++ 2M Karras",       # 8 sampler
              "1024 x 1024",           # 9 aspect_ratio
              "(None)",                # 10 style_preset
              "Standard v3.1",         # 11 quality_tags_presets
              False,                   # 12 use_upscaler
              0.5,                     # 13 strength
              1.0,                     # 14 upscale_by
              True,                    # 15 add_quality_tags
              api_name="/run"
          )

          gallery = result[0]
          image_path = gallery[0]['image']
          shutil.copy(image_path, "anime_original.png")
          print("✅ Anime image saved.")
          PYEOF

      - name: Convert to 3D with Hunyuan3D-2 (robust extraction)
        run: |
          python3 << 'PYEOF'
          import shutil, json, os
          from gradio_client import Client, handle_file

          def find_glb_file(data, path_prefix=""):
              """بازگشتی می‌گردد و اولین فایل GLB را برمی‌گرداند"""
              if isinstance(data, str) and data.endswith('.glb'):
                  return data
              elif isinstance(data, (list, tuple)):
                  for item in data:
                      found = find_glb_file(item)
                      if found:
                          return found
              elif isinstance(data, dict):
                  for key, value in data.items():
                      if isinstance(value, str) and value.endswith('.glb'):
                          return value
                      # شاید کلید "file" یا "path" مقدارش یک مسیر فایل باشد
                      if key in ('file', 'path', 'filename', 'name') and isinstance(value, str):
                          # اگر پسوند glb داشت که عالی
                          if value.endswith('.glb'):
                              return value
                          # در غیر این صورت شاید فایلی با مسیر کامل نباشد؛ ادامه بده
                      # جستجوی عمیق در value
                      found = find_glb_file(value)
                      if found:
                          return found
              return None

          print("🧊 Converting to 3D...")
          client = Client("tencent/Hunyuan3D-2")

          result = client.predict(
              caption="anime character",
              image=handle_file("anime_original.png"),
              steps=25,
              guidance_scale=6.0,
              seed=42,
              octree_resolution="256",
              check_box_rembg=True,
              api_name="/shape_generation"
          )

          print("Conversion result type:", type(result))
          # ذخیره خروجی خام برای بررسی دستی (در صورت نیاز)
          with open("hunyuan_raw_output.json", "w") as f:
              json.dump(str(result), f)

          glb_path = find_glb_file(result)
          if glb_path and os.path.exists(glb_path):
              shutil.copy(glb_path, "anime_model.glb")
              print("✅ 3D model saved.")
          else:
              print("⚠️ GLB file not found automatically. Check hunyuan_raw_output.json")
              exit(1)
          PYEOF

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add anime_original.png anime_model.glb hunyuan_raw_output.json 2>/dev/null || true
          git commit -m "🎨 Anime image + 3D model | $(date '+%H:%M:%S')" || echo "Nothing to commit"
          git pull --rebase && git push
          echo "✅ Workflow finished."
