name: Anime to 3D Final (Positional)

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'توضیحات کاراکتر انیمه‌ای (انگلیسی)'
        required: true
        default: '1girl, solo, long hair, blue eyes, detailed kimono, cherry blossoms, masterpiece, best quality'
      negative_prompt:
        description: 'چیزهایی که نمی‌خواهید'
        required: false
        default: 'lowres, bad anatomy, bad hands, text, error, missing fingers, extra digit, fewer digits, cropped, worst quality, low quality, normal quality, jpeg artifacts, signature, watermark, username, blurry'

permissions:
  contents: write

jobs:
  anime-to-3d:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install -q gradio_client pillow

      - name: Generate anime image
        env:
          PROMPT: ${{ inputs.prompt }}
          NEGATIVE_PROMPT: ${{ inputs.negative_prompt }}
        run: |
          python3 << 'PYEOF'
          import os, shutil, json
          from gradio_client import Client

          prompt = os.environ["PROMPT"]
          neg_prompt = os.environ["NEGATIVE_PROMPT"]

          print("🎨 Generating anime image...")
          client = Client("cagliostrolab/animagine-xl-3.1")

          result = client.predict(
              prompt,                  # 1
              neg_prompt,              # 2
              42,                      # 3 seed
              1024,                    # 4 width
              1024,                    # 5 height
              7,                       # 6 guidance_scale
              28,                      # 7 num_inference_steps
              "DPM++ 2M Karras",       # 8 sampler
              "1024 x 1024",           # 9 aspect_ratio
              "(None)",                # 10 style_preset
              "Standard v3.1",         # 11 quality_tags_presets
              False,                   # 12 use_upscaler
              0.5,                     # 13 strength
              1.0,                     # 14 upscale_by
              True,                    # 15 add_quality_tags
              api_name="/run"
          )

          # The result is a gallery (list of dicts with 'image' key)
          if isinstance(result, list) and len(result) > 0:
              img_path = result[0].get('image')
              if img_path:
                  shutil.copy(img_path, "anime_original.png")
                  print("✅ Anime image saved.")
              else:
                  raise RuntimeError("No image key in gallery")
          elif isinstance(result, str) and result.endswith(('.png', '.jpg', '.webp')):
              shutil.copy(result, "anime_original.png")
              print("✅ Direct image saved.")
          else:
              with open("debug_animagine.json", "w") as f:
                  json.dump(result, f)
              raise RuntimeError("Unexpected result from Animagine. See debug_animagine.json")
          PYEOF

      - name: Convert to 3D model
        run: |
          python3 << 'PYEOF'
          import shutil
          from gradio_client import Client, handle_file

          print("🧊 Converting to 3D...")
          client = Client("tencent/Hunyuan3D-2")

          result = client.predict(
              "anime character",                # caption
              handle_file("anime_original.png"), # image
              25,                               # steps
              6,                                # guidance_scale
              42,                               # seed
              "256",                            # octree_resolution
              True,                             # check_box_rembg
              api_name="/shape_generation"
          )

          # Standard output: tuple (glb_path, obj_path, html_path)
          glb_saved = False
          if isinstance(result, tuple):
              for item in result:
                  if isinstance(item, str) and item.endswith('.glb'):
                      shutil.copy(item, "anime_model.glb")
                      glb_saved = True
                      print("✅ 3D model saved.")
                      break
          elif isinstance(result, str) and result.endswith('.glb'):
              shutil.copy(result, "anime_model.glb")
              glb_saved = True
              print("✅ 3D model from string.")

          if not glb_saved:
              with open("debug_hunyuan.txt", "w") as f:
                  f.write(str(result))
              print("❌ No GLB found. Debug saved to debug_hunyuan.txt.")
          PYEOF

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add anime_original.png anime_model.glb debug_*.json debug_*.txt 2>/dev/null || true
          git commit -m "🎨 New anime 3D generation | $(date '+%H:%M:%S')" || echo "Nothing to commit"
          git pull --rebase && git push
          echo "✅ Finished."
