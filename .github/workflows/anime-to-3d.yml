name: Anime Image → 3D Model (Really Fixed)

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'پرامپت (انگلیسی)'
        required: true
        default: '1girl, solo, long hair, blue eyes, detailed kimono, cherry blossoms, masterpiece, best quality'
      negative_prompt:
        description: 'پرامپت منفی'
        required: false
        default: 'lowres, bad anatomy, bad hands, text, error, cropped, worst quality, low quality, normal quality, jpeg artifacts, signature, watermark, username, blurry'

permissions:
  contents: write

jobs:
  image-to-3d:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: pip install -q gradio_client pillow

      - name: Generate Anime Image
        env:
          PROMPT: ${{ inputs.prompt }}
          NEGATIVE_PROMPT: ${{ inputs.negative_prompt }}
        run: |
          echo "🎨 مرحله ۱: ساخت تصویر انیمه‌ای..."
          python3 << 'PYEOF'
          import os, shutil
          from gradio_client import Client

          prompt = os.environ["PROMPT"]
          neg_prompt = os.environ["NEGATIVE_PROMPT"]

          client = Client("cagliostrolab/animagine-xl-3.1")
          
          result = client.predict(
              prompt=prompt,
              negative_prompt=neg_prompt,
              seed=42,
              width=1024,
              height=1024,
              guidance_scale=7,
              num_inference_steps=28,
              sampler="DPM++ 2M Karras",
              aspect_ratio="1024 x 1024",
              style_preset="(None)",
              quality_tags_presets="Standard v3.1",
              use_upscaler=False,
              strength=0.5,
              upscale_by=1.0,
              add_quality_tags=True,
              api_name="/predict"
          )
          
          shutil.copy(result, "anime_original.png")
          print("✅ تصویر انیمه ذخیره شد: anime_original.png")
          PYEOF

      - name: Convert to 3D Model
        run: |
          echo "🧊 مرحله ۲: تبدیل به مدل سه‌بعدی..."
          python3 << 'PYEOF'
          import shutil
          from gradio_client import Client, handle_file

          client = Client("tencent/Hunyuan3D-2")
          
          result = client.predict(
              caption="anime character",
              image=handle_file("anime_original.png"),
              steps=25,
              guidance_scale=6,
              seed=42,
              octree_resolution="256",
              check_box_rembg=True,
              api_name="/shape_generation"
          )

          print(f"خروجی مدل سه‌بعدی: {result}")
          
          if isinstance(result, tuple) and len(result) >= 1:
              glb_file = result[0]
              if glb_file and isinstance(glb_file, str) and glb_file.endswith('.glb'):
                  shutil.copy(glb_file, "anime_model.glb")
                  print("✅ مدل سه‌بعدی ذخیره شد: anime_model.glb")
              else:
                  print(f"⚠️ خروجی اول glb نیست: {glb_file}")
                  # شاید ساختار خروجی متفاوت باشه
                  if isinstance(result, str) and result.endswith('.glb'):
                      shutil.copy(result, "anime_model.glb")
                      print("✅ مدل سه‌بعدی (از خروجی مستقیم) ذخیره شد")
          elif isinstance(result, str) and result.endswith('.glb'):
              shutil.copy(result, "anime_model.glb")
              print("✅ مدل سه‌بعدی ذخیره شد: anime_model.glb")
          else:
              print(f"⚠️ خروجی غیرمنتظره - نوع: {type(result)}")
              with open("output_info.txt", "w") as f:
                  f.write(str(result))
          PYEOF

      - name: Commit and Push Results
        run: |
          echo "📤 ذخیره نتایج در ریپازیتوری..."
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add anime_original.png anime_model.glb output_info.txt 2>/dev/null || true
          git commit -m "🎨 تصویر انیمه و مدل سه‌بعدی | $(date '+%H:%M:%S')" || echo "چیزی برای کامیت نبود"
          git pull --rebase && git push || echo "Push ناموفق"
          echo "✅ فرآیند تکمیل شد!"
