name: Anime to 3D Final Fixed

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'توضیحات کاراکتر انیمه‌ای (انگلیسی)'
        required: true
        default: '1girl, solo, long hair, blue eyes, detailed kimono, cherry blossoms, masterpiece, best quality'
      negative_prompt:
        description: 'چیزهایی که نمی‌خواهید'
        required: false
        default: 'lowres, bad anatomy, bad hands, text, error, missing fingers, extra digit, fewer digits, cropped, worst quality, low quality, normal quality, jpeg artifacts, signature, watermark, username, blurry'

permissions:
  contents: write

jobs:
  anime-to-3d:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install -q gradio_client pillow

      - name: Generate anime image with Animagine XL
        env:
          PROMPT: ${{ inputs.prompt }}
          NEGATIVE_PROMPT: ${{ inputs.negative_prompt }}
        run: |
          python3 << 'PYEOF'
          import os, shutil
          from gradio_client import Client

          prompt = os.environ["PROMPT"]
          neg_prompt = os.environ["NEGATIVE_PROMPT"]

          print("🎨 Generating anime image...")
          client = Client("cagliostrolab/animagine-xl-3.1")

          result = client.predict(
              prompt,                  # 1
              neg_prompt,              # 2
              42,                      # 3 seed
              1024,                    # 4 width
              1024,                    # 5 height
              7,                       # 6 guidance_scale
              28,                      # 7 num_inference_steps
              "DPM++ 2M Karras",       # 8 sampler
              "1024 x 1024",           # 9 aspect_ratio
              "(None)",                # 10 style_preset
              "Standard v3.1",         # 11 quality_tags_presets
              False,                   # 12 use_upscaler
              0.5,                     # 13 strength
              1.0,                     # 14 upscale_by
              True,                    # 15 add_quality_tags
              api_name="/run"
          )

          gallery = result[0]
          image_path = gallery[0]['image']
          shutil.copy(image_path, "anime_original.png")
          print("✅ Anime image saved.")
          PYEOF

      - name: Convert to 3D with Hunyuan3D-2
        run: |
          python3 << 'PYEOF'
          import shutil
          from gradio_client import Client, handle_file

          print("🧊 Converting to 3D...")
          client = Client("tencent/Hunyuan3D-2")

          result = client.predict(
              caption="anime character",
              image=handle_file("anime_original.png"),
              steps=25,
              guidance_scale=6.0,
              seed=42,
              octree_resolution="256",
              check_box_rembg=True,
              api_name="/shape_generation"
          )

          glb_path = result[0]
          shutil.copy(glb_path, "anime_model.glb")
          print("✅ 3D model saved.")
          PYEOF

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add anime_original.png anime_model.glb
          git commit -m "🎨 Anime image + 3D model | $(date '+%H:%M:%S')" || echo "Nothing to commit"
          git pull --rebase && git push
          echo "✅ Workflow finished."
