name: Test HF Router API

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Test Llama 3.1 70B via Router
        run: |
          echo "========================================="
          echo "🧪 تست اتصال به Router API"
          echo "========================================="
          
          HF_TOKEN="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"
          API_URL="https://router.huggingface.co/v1/chat/completions"
          
          DATA=$(cat <<EOF
          {
            "model": "meta-llama/Llama-3.1-70B-Instruct",
            "messages": [
              {"role": "user", "content": "سلام. خودت رو معرفی کن و بگو چند سالته؟"}
            ],
            "max_tokens": 200,
            "temperature": 0.7,
            "stream": false
          }
          EOF
          )
          
          echo "📤 در حال ارسال درخواست..."
          
          RESPONSE=$(curl -s -X POST "$API_URL" \
            -H "Authorization: Bearer $HF_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$DATA" \
            --connect-timeout 30 \
            --max-time 120)
          
          CURL_EXIT=$?
          
          echo ""
          echo "📥 پاسخ دریافت شد (کد خروج curl: $CURL_EXIT)"
          echo ""
          echo "===== پاسخ خام ====="
          echo "$RESPONSE"
          echo "===== پایان ====="
          echo ""
          
          # ذخیره نتیجه
          echo "# نتیجه تست Router API" > test-result.md
          echo "" >> test-result.md
          echo "**تاریخ:** $(date '+%Y-%m-%d %H:%M:%S')" >> test-result.md
          echo "" >> test-result.md
          echo "## پاسخ خام:" >> test-result.md
          echo '```json' >> test-result.md
          echo "$RESPONSE" >> test-result.md
          echo '```' >> test-result.md
          echo "" >> test-result.md
          
          # تحلیل پاسخ
          if [ $CURL_EXIT -ne 0 ]; then
            echo "❌ **خطای اتصال:** curl exit code = $CURL_EXIT" >> test-result.md
          elif echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['choices'][0]['message']['content'])" 2>/dev/null; then
            echo "✅ **مدل پاسخ داد!**" >> test-result.md
          elif echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('error',''))" 2>/dev/null; then
            echo "⚠️ **خطا از سمت سرور:**" >> test-result.md
          else
            echo "❓ **پاسخ نامشخص**" >> test-result.md
          fi

      - name: Push Result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add test-result.md
          git commit -m "نتیجه تست Router API" || echo "بدون تغییر"
          git push
