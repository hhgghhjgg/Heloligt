name: Test Clean IPs for Instagram

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Test all IPs
        run: |
          # لیست IP های تمیز کلادفلر
          cat << 'EOF' > ips.txt
          162.159.192.1
          162.159.193.1
          162.159.195.1
          162.159.204.1
          188.114.96.1
          188.114.97.1
          EOF
          
          # اضافه کردن IP های SuperDNS (اونا هم IP کلادفلر هستن)
          cat << 'EOF' >> ips.txt
          64.6.64.6
          64.6.65.6
          77.88.8.8
          77.88.8.1
          156.154.70.1
          199.85.127.10
          8.20.247.20
          208.67.222.222
          208.67.220.220
          223.5.5.5
          217.218.26.77
          93.118.122.110
          8.26.56.26
          216.146.36.36
          195.46.39.39
          4.2.2.2
          198.101.242.72
          5.160.12.98
          80.80.80.80
          EOF
          
          echo "🧪 Testing $(wc -l < ips.txt) IPs..."
          
          > results.txt
          
          while IFS= read -r ip; do
            [ -z "$ip" ] && continue
            echo "Testing: $ip"
            
            # تست ۱: Ping
            ping -c 2 -W 3 "$ip" > /dev/null 2>&1 && ping_status="✅" || ping_status="❌"
            
            # تست ۲: Instagram
            insta_http=$(curl -s -o /dev/null -w "%{http_code}" -m 10 --resolve "instagram.com:443:$ip" https://instagram.com 2>/dev/null || echo "000")
            
            # تست ۳: Cloudflare
            cf_http=$(curl -s -o /dev/null -w "%{http_code}" -m 5 --resolve "cloudflare.com:443:$ip" https://cloudflare.com 2>/dev/null || echo "000")
            
            # تست ۴: Latency
            latency=$(ping -c 1 -W 2 "$ip" 2>/dev/null | grep 'time=' | awk -F'time=' '{print $2}' | awk '{print $1}' || echo "N/A")
            
            echo "$ip | Ping:$ping_status | Instagram:$insta_http | Cloudflare:$cf_http | Latency:${latency}ms" >> results.txt
            
            # اگه اینستاگرام باز شد
            if [ "$insta_http" = "200" ] || [ "$insta_http" = "301" ] || [ "$insta_http" = "302" ]; then
              echo "🎯 WORKING FOR INSTAGRAM: $ip" >> results.txt
            fi
            
          done < ips.txt
          
          echo ""
          echo "=== RESULTS ==="
          cat results.txt

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results.txt ips.txt
          git commit -m "📊 IP test results | $(date '+%Y-%m-%d %H:%M')" || echo "Nothing to commit"
          git pull --rebase && git push || true
