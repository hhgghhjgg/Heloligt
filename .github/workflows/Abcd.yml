name: Download Manga Chapter to Repository

on:
  workflow_dispatch:
    inputs:
      chapter_url:
        description: 'لینک صفحه Reader فصل'
        required: true
        default: 'https://www.mgeko.cc/reader/en/im-the-king-of-wealth-in-the-three-realms-chapter-11-eng-li/'

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      flaresolverr:
        image: ghcr.io/flaresolverr/flaresolverr:latest
        ports:
          - 8191:8191

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: pip install -q requests beautifulsoup4

      - name: Wait for FlareSolverr
        run: |
          for i in $(seq 1 30); do
            status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8191/v1 2>/dev/null || echo "000")
            if [ "$status" = "200" ] || [ "$status" = "405" ]; then
              echo "FlareSolverr ready"
              break
            fi
            sleep 2
          done

      - name: Fetch Manga Chapter
        env:
          CHAPTER_URL: ${{ inputs.chapter_url }}
        run: |
          python3 << 'PYEOF'
          import os, re, json, time, requests
          from bs4 import BeautifulSoup
          from urllib.parse import urljoin
          from pathlib import Path

          chapter_url = os.environ["CHAPTER_URL"]
          chapter_name = "chapter_" + re.search(r'chapter-(\d+)', chapter_url).group(1)

          print(f"Fetching: {chapter_url}")
          resp = requests.post("http://localhost:8191/v1", json={
              "cmd": "request.get", "url": chapter_url, "maxTimeout": 180000
          }, timeout=240)
          data = resp.json()

          html = data.get("solution", {}).get("response", "")
          if not html:
              print("Error: Empty response")
              exit(1)

          soup = BeautifulSoup(html, 'html.parser')
          images = []
          for img in soup.find_all('img'):
              src = img.get('src') or img.get('data-src') or ''
              if src and 'imgsrv4.com' in src:
                  images.append(urljoin(chapter_url, src))

          images = list(dict.fromkeys(images))
          print(f"Found {len(images)} images")

          os.makedirs(f"manga_downloads/{chapter_name}", exist_ok=True)

          for i, img_url in enumerate(images, 1):
              fname = f"manga_downloads/{chapter_name}/{i:03d}.jpg"
              r = requests.get(img_url, timeout=60)
              if r.status_code == 200:
                  Path(fname).write_bytes(r.content)
                  print(f"  [{i}/{len(images)}] OK ({len(r.content)//1024} KB)")
              time.sleep(0.3)

          print("Done!")
          PYEOF

      - name: Save to Repository
        run: |
          git config user.name "MangaBot"
          git config user.email "mangabot@noreply.github.com"
          git pull origin main --rebase
          git add manga_downloads/
          git commit -m "📖 Add manga chapter $(date +%Y%m%d_%H%M%S)" || echo "No new files"
          git push origin main
