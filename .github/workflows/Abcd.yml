name: Advanced Cloudflare Bypass (SeleniumBase)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'آدرس سایت (مثلاً https://manhwaus.org)'
        required: true
        default: 'https://manhwaus.org'

jobs:
  bypass:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python & Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable || true
          pip install seleniumbase

      - name: Fetch page with SeleniumBase (undetected Chrome)
        env:
          TARGET_URL: ${{ inputs.url }}
        run: |
          python3 << 'PYEOF'
          import os, sys
          from seleniumbase import SB

          target = os.environ["TARGET_URL"]
          print(f"Navigating to {target} with undetected Chrome...")

          with SB(uc=True, headless=True) as sb:
              sb.uc_open_with_reconnect(target, reconnect_time=5)
              sb.sleep(5)  # Wait for Cloudflare challenge to complete
              source = sb.get_page_source()
              title = sb.get_title()
              print(f"Page title: {title}")
              with open("page.html", "w", encoding="utf-8") as f:
                  f.write(source)
              print("Page saved to page.html")
              # Optionally take screenshot
              sb.save_screenshot("screenshot.png")
          PYEOF

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: bypass-result
          path: |
            page.html
            screenshot.png

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add page.html screenshot.png 2>/dev/null || true
          git commit -m "نتایج Cloudflare Bypass برای ${{ inputs.url }} | $(date '+%H:%M:%S')" || echo "چیزی برای commit نیست"
          git pull --rebase && git push || true
