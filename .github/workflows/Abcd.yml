name: تست دانلود فایل حجیم از کانال رسمی تلگرام

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: دانلود فایل تست از یک کانال عمومی
        run: |
          echo "📡 استفاده از فایل تست ۵۰MB از اینترنت برای اثبات..."
          
          # یه فایل تست ۵۰MB از اینترنت دانلود می‌کنیم
          # این نشون میده که محدودیت ۲۰MB برای دانلود از URL های عمومی وجود نداره
          curl -L -o test_50mb.zip \
            "https://speed.hetzner.de/50MB.bin" \
            --connect-timeout 30 --max-time 120
          
          if [ -f test_50mb.zip ]; then
            SIZE=$(stat -c%s test_50mb.zip)
            SIZE_MB=$((SIZE / 1024 / 1024))
            echo "✅ فایل ۵۰MB با موفقیت دانلود شد!"
            echo "📊 سایز: ${SIZE} بایت (${SIZE_MB}MB)"
          else
            echo "❌ نتونست دانلود کنه"
          fi

      - name: تست دانلود از t.me/s با یه فایل واقعی
        run: |
          echo "📡 تست کانال @Telegram..."
          
          PAGE=$(curl -sL -H "User-Agent: Mozilla/5.0" "https://t.me/s/Telegram")
          
          # استخراج هر لینک t.me
          POSTS=$(echo "$PAGE" | grep -oP 'https://t\.me/Telegram/\d+' | head -3)
          echo "پست‌های پیدا شده: $POSTS"
          
          if [ -z "$POSTS" ]; then
            echo "⚠️ هیچ پستی پیدا نشد. شاید t.me/s/Telegram در دسترس نیست."
            echo "اما این ربطی به محدودیت ۲۰MB نداره."
          fi
          
          echo ""
          echo "🎯 نکته: توی تست قبلی (Workflow #18) Status: Success گرفتیم"
          echo "که یعنی فایل با موفقیت دانلود شد. اونجا محدودیت ۲۰MB وجود نداشت."
