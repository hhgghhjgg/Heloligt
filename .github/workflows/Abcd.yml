name: Kingofshojo Test

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      flaresolverr:
        image: ghcr.io/flaresolverr/flaresolverr:latest
        ports:
          - 8191:8191

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install -q requests

      - name: Wait for FlareSolverr
        run: |
          for i in $(seq 1 30); do
            status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8191/v1 2>/dev/null || echo "000")
            if [ "$status" = "200" ] || [ "$status" = "405" ]; then
              echo "FlareSolverr ready"
              break
            fi
            sleep 2
          done

      - name: Fetch Kingofshojo homepage
        run: |
          python3 << 'PYEOF'
          import requests, time, os
          from datetime import datetime

          target = "https://kingofshojo.com/"

          url = "http://localhost:8191/v1"
          headers = {"Content-Type": "application/json"}
          payload = {
              "cmd": "request.get",
              "url": target,
              "maxTimeout": 180000
          }

          print(f"Fetching {target}")
          start = time.time()

          try:
              resp = requests.post(url, headers=headers, json=payload, timeout=240)
              elapsed = round(time.time() - start, 1)
              data = resp.json()

              print(f"Time: {elapsed}s")
              print(f"Status: {data.get('status')}")
              print(f"Message: {data.get('message')}")

              sol = data.get("solution", {})
              http_status = sol.get("status")
              html = sol.get("response", "")
              cookies = sol.get("cookies", [])

              print(f"HTTP Status: {http_status}")
              print(f"Cookies count: {len(cookies) if isinstance(cookies, list) else 0}")

              with open("kingofshojo.html", "w", encoding="utf-8") as f:
                  f.write(html if html else "")

              with open("result.txt", "w", encoding="utf-8") as f:
                  f.write(f"URL: {target}\n")
                  f.write(f"Date: {datetime.now()}\n")
                  f.write(f"Time: {elapsed}s\n")
                  f.write(f"Status: {data.get('status')}\n")
                  f.write(f"Message: {data.get('message')}\n")
                  f.write(f"HTTP Status: {http_status}\n")
                  f.write(f"Cookies: {cookies}\n\n")
                  f.write("=== HTML (first 3000 chars) ===\n")
                  f.write(html[:3000] if html else "EMPTY")

              if http_status == 200 and html:
                  print("\n✅ SUCCESS - Kingofshojo opened!")
              elif http_status == 403:
                  print("\n❌ Blocked by Cloudflare (403)")
              else:
                  print(f"\n⚠️ HTTP {http_status}")

          except Exception as e:
              print(f"Error: {e}")
          PYEOF

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kingofshojo.html result.txt 2>/dev/null || true
          git commit -m "Kingofshojo homepage | $(date '+%H:%M:%S')" || echo "Nothing to commit"
          git pull --rebase && git push || true
