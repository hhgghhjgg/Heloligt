name: تست نهایی دانلود فایل حجیم

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: گرفتن فایل از کانال عمومی
        run: |
          echo "📡 تست با کانال عمومی @cubli..."
          
          # 1. صفحه t.me/s رو باز کن
          PAGE=$(curl -sL -H "User-Agent: Mozilla/5.0" "https://t.me/s/cubli")
          
          # 2. اولین لینک پست رو پیدا کن
          POST_LINK=$(echo "$PAGE" | grep -oP 'https://t\.me/cubli/\d+' | head -1)
          echo "🔗 پست: $POST_LINK"
          
          if [ -z "$POST_LINK" ]; then
            echo "❌ پستی پیدا نشد!"
            exit 0
          fi
          
          # 3. محتوای پست رو بگیر
          POST_PAGE=$(curl -sL -H "User-Agent: Mozilla/5.0" "$POST_LINK")
          
          # 4. لینک مستقیم فایل رو استخراج کن
          FILE_URL=$(echo "$POST_PAGE" | grep -oP 'https://[^"]+\.(apk|zip|pdf|rar|7z|tar\.gz)[^"]*' | head -1)
          
          if [ -z "$FILE_URL" ]; then
            echo "❌ فایلی توی این پست نیست!"
            exit 0
          fi
          
          echo "📥 در حال دانلود..."
          curl -L -o test_file.download "$FILE_URL"
          
          if [ -f test_file.download ]; then
            SIZE=$(stat -c%s test_file.download)
            SIZE_MB=$((SIZE / 1024 / 1024))
            echo "✅ سایز: ${SIZE} بایت (${SIZE_MB}MB)"
            if [ $SIZE_MB -gt 20 ]; then
              echo "🎉🎉🎉 اثبات شد! 🎉🎉🎉"
              echo "فایل ${SIZE_MB} مگابایتی با موفقیت دانلود شد."
              echo "محدودیت ۲۰MB برای t.me/s وجود ندارد!"
            fi
          else
            echo "❌ دانلود ناموفق"
          fi
