name: Fetch Any Page with FlareSolverr

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'آدرس کامل صفحه (مثلاً صفحه چپتر یا هر صفحه دیگر)'
        required: true
        default: 'https://kingofshojo.com/'

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      flaresolverr:
        image: ghcr.io/flaresolverr/flaresolverr:latest
        ports:
          - 8191:8191

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install -q requests

      - name: Wait for FlareSolverr
        run: |
          for i in $(seq 1 30); do
            status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8191/v1 2>/dev/null || echo "000")
            if [ "$status" = "200" ] || [ "$status" = "405" ]; then
              echo "FlareSolverr ready"
              break
            fi
            sleep 2
          done

      - name: Fetch page
        env:
          TARGET_URL: ${{ inputs.url }}
        run: |
          python3 << 'PYEOF'
          import requests, time, os, re
          from datetime import datetime

          target = os.environ["TARGET_URL"]

          url = "http://localhost:8191/v1"
          headers = {"Content-Type": "application/json"}
          payload = {
              "cmd": "request.get",
              "url": target,
              "maxTimeout": 180000
          }

          print(f"Fetching: {target}")
          start = time.time()

          try:
              resp = requests.post(url, headers=headers, json=payload, timeout=240)
              elapsed = round(time.time() - start, 1)
              data = resp.json()

              print(f"Time: {elapsed}s")
              print(f"FlareSolverr status: {data.get('status')}")
              print(f"Message: {data.get('message')}")

              sol = data.get("solution", {})
              http_status = sol.get("status")
              html = sol.get("response", "")
              cookies = sol.get("cookies", [])

              print(f"HTTP status: {http_status}")

              # نام فایل بر اساس URL
              safe_name = re.sub(r'[^a-zA-Z0-9\u0600-\u06FF_\-\.]', '_', target)
              if len(safe_name) > 100:
                  safe_name = safe_name[:100]

              html_filename = f"page_{safe_name}.html"
              txt_filename = f"result_{safe_name}.txt"

              with open(html_filename, "w", encoding="utf-8") as f:
                  f.write(html if html else "")

              with open(txt_filename, "w", encoding="utf-8") as f:
                  f.write(f"URL: {target}\n")
                  f.write(f"Date: {datetime.now()}\n")
                  f.write(f"Time: {elapsed}s\n")
                  f.write(f"FlareSolverr status: {data.get('status')}\n")
                  f.write(f"Message: {data.get('message')}\n")
                  f.write(f"HTTP status: {http_status}\n")
                  f.write(f"Cookies: {cookies}\n\n")
                  f.write("=== HTML (first 3000 chars) ===\n")
                  f.write(html[:3000] if html else "EMPTY")

              if http_status == 200 and html:
                  print("✅ SUCCESS")
              elif http_status == 403:
                  print("❌ Blocked by Cloudflare (403)")
              else:
                  print(f"⚠️ HTTP {http_status}")

          except Exception as e:
              print(f"Error: {e}")
          PYEOF

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add page_*.html result_*.txt 2>/dev/null || true
          git commit -m "Fetched ${{ inputs.url }} | $(date '+%H:%M:%S')" || echo "Nothing to commit"
          git pull --rebase && git push || true
