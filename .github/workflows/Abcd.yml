name: دانلود فایل حجیم از t.me/s

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: دانلود فایل APK از کانال رسمی تلگرام
        run: |
          echo "📡 باز کردن کانال رسمی تلگرام (t.me/s/tgandroid)..."
          
          PAGE=$(curl -sL -k \
            -H "User-Agent: Mozilla/5.0" \
            "https://t.me/s/tgandroid")
          
          LAST_POST=$(echo "$PAGE" | grep -oP 'https://t\.me/tgandroid/\d+' | head -1)
          
          if [ -z "$LAST_POST" ]; then
            echo "⚠️ هیچ پستی پیدا نشد. شاید t.me/s/tgandroid در دسترس نیست."
            exit 0
          fi
          
          echo "🔗 پست: $LAST_POST"
          
          POST_PAGE=$(curl -sL -k \
            -H "User-Agent: Mozilla/5.0" \
            "$LAST_POST")
          
          CDN_URL=$(echo "$POST_PAGE" | grep -oP 'https://[^"]+\.apk[^"]*' | head -1)
          
          if [ -z "$CDN_URL" ]; then
            echo "⚠️ لینک APK پیدا نشد."
            exit 0
          fi
          
          echo "📥 در حال دانلود..."
          
          curl -k -L -o Telegram.apk \
            -H "User-Agent: Mozilla/5.0" \
            --connect-timeout 30 --max-time 300 \
            "$CDN_URL"
          
          if [ -f Telegram.apk ]; then
            SIZE=$(stat -c%s Telegram.apk)
            SIZE_MB=$((SIZE / 1024 / 1024))
            echo "✅ سایز: ${SIZE} بایت (${SIZE_MB}MB)"
            if [ "$SIZE_MB" -gt 20 ]; then
              echo "🎉 اثبات شد! فایل ${SIZE_MB}MB از t.me/s دانلود شد!"
            fi
          else
            echo "❌ دانلود ناموفق"
          fi

      - name: Commit و Push فایل
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Telegram.apk 2>/dev/null || true
          git commit -m "📦 Telegram APK from t.me/s" || echo "Nothing to commit"
          git pull --rebase && git push || true
