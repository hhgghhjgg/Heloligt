name: Auto Build Babylon.js

on:
  push:
    paths:
      - '.github/workflows/build.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clone Babylon.js
        uses: actions/checkout@v4
        with:
          repository: BabylonJS/Babylon.js

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Try build commands
        run: |
          if npm run | grep -q "build:umd"; then
            npm run build:umd
          elif npm run | grep -q "build:dev"; then
            npm run build:dev
          elif npm run | grep -q "build"; then
            npm run build
          else
            echo "checking available scripts..."
            npm run
            exit 1
          fi

      - name: Find babylon.js
        id: findfile
        run: |
          FILE=$(find . -name "babylon.js" -not -path "*/node_modules/*" -not -path "*/.git/*" -type f -size +100k | head -n 1)
          if [ -z "$FILE" ]; then
            echo "No file found, searching harder..."
            FILE=$(find . -name "babylon.js" -not -path "*/node_modules/*" -not -path "*/.git/*" -type f | head -n 1)
          fi
          echo "Found: $FILE"
          echo "filepath=$FILE" >> $GITHUB_OUTPUT

      - name: Clone target repo
        uses: actions/checkout@v4
        with:
          path: target-repo

      - name: Copy file and commit
        run: |
          mkdir -p target-repo/dist
          cp ${{ steps.findfile.outputs.filepath }} target-repo/dist/babylon.js
          cd target-repo
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add dist/babylon.js
          git commit -m "Update babylon.js build" || echo "No changes to commit"
          git push
