name: Get Babylon.js
on: workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clone Babylon.js
        uses: actions/checkout@v4
        with:
          repository: BabylonJS/Babylon.js

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build
        run: |
          npm install
          npm run build:umd

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: babylon-file
          path: packages/tools/babylonServer/public/babylon.js
